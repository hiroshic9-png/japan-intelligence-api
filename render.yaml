# Japan Intelligence Backend
services:
  - type: web
    name: japan-intelligence-api
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: EDINET_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
